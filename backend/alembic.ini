[alembic]
script_location = alembic
prepend_sys_path = .

# Use DATABASE_URL from env if set; otherwise fall back to SQLite default.
# Override per-env via the -x flag: alembic -x db_url=postgresql://... upgrade head
sqlalchemy.url = sqlite:///./smart_attendance.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
