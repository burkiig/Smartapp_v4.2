# Local / staging stack — adjust env_file paths for your machine.
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - UVICORN_HOST=0.0.0.0
    restart: unless-stopped

  # Optional: add PostgreSQL + DATABASE_URL when migrating off SQLite.
