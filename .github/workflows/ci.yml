name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r requirements-test.txt
      - name: Pytest
        run: pytest tests/ -q --tb=short

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-panel/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          CI: "true"
