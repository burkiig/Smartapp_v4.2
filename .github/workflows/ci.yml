name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Required by docker-compose interpolation; safe dummy values for CI tests.
      SECRET_KEY: ci-test-secret-key
      ADMIN_PASSWORD: ci-admin-password
      POSTGRES_PASSWORD: ci-postgres-password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (cache-enabled)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: smart-attendance-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in backend container (no deps, SQLite)
        run: |
          docker compose run --rm --no-deps \
            -e ENV=test \
            -e TESTING=true \
            -e DATABASE_URL=sqlite:///./test.db \
            backend \
            python -m pytest -v
