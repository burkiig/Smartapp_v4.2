name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the backend image once, using GitHub Actions layer cache.
      # Subsequent pushes reuse cached layers — heavy packages (insightface,
      # onnxruntime) are only re-downloaded when requirements.txt changes.
      - name: Build backend image (cache-enabled)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: smart-attendance-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run pytest directly in the pre-built image — no docker-compose rebuild.
      # SQLite is used so no database service is needed.
      - name: Run backend tests
        run: |
          docker run --rm \
            -e ENV=test \
            -e TESTING=true \
            -e DATABASE_URL=sqlite:///./test.db \
            -e SECRET_KEY=ci-test-secret-key-not-used-in-prod \
            -e ADMIN_PASSWORD=ci-admin-password \
            smart-attendance-backend:ci \
            python -m pytest -v --tb=short
